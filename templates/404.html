{% extends "base.html" %}
{% block title %}Page Not Found — Muddo Agro{% endblock %}
{% block content %}
<section style="min-height:70vh;display:flex;align-items:center;justify-content:center;padding:60px 20px;">
  <div style="text-align:center;max-width:500px;" class="anim-scale-in">
    <div style="font-size:6rem;font-weight:900;color:var(--green-pale,#d4edda);font-family:'Playfair Display',serif;line-height:1;margin-bottom:0;">404</div>
    <div style="width:80px;height:4px;background:linear-gradient(90deg,var(--orange,#e8651a),var(--gold));border-radius:2px;margin:16px auto 24px;"></div>
    <h2 style="font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:800;color:var(--text-primary);margin-bottom:12px;">Page Not Found</h2>
    <p style="color:var(--text-muted);line-height:1.75;margin-bottom:32px;">The page you're looking for doesn't exist or has been moved. Let's get you back to something useful.</p>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
      <a href="/" class="btn-green btn-ripple"><i class="fas fa-home"></i> Go Home</a>
      <a href="{{ url_for('pesticides') }}" class="btn-outline"><i class="fas fa-flask"></i> Browse Products</a>
      <a href="{{ url_for('contact') }}" class="btn-outline"><i class="fas fa-envelope"></i> Contact Us</a>
    </div>
  </div>
</section>
{% endblock %}
