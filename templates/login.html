<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — Muddo Agro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon-lg"><i class="fas fa-leaf"></i></div>
      <h2>Muddo Agro Admin</h2>
      <p>Sign in to the management portal</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}{% for cat, msg in messages %}
        <div class="flash flash-{{ cat }}" style="margin-bottom:16px;border-radius:8px;">
          <i class="fas fa-exclamation-circle"></i> {{ msg }}
        </div>
      {% endfor %}{% endif %}
    {% endwith %}

    <form method="POST">
      <div class="form-group">
        <label for="username"><i class="fas fa-user"></i> Username</label>
        <input type="text" id="username" name="username" placeholder="admin" required autofocus>
      </div>
      <div class="form-group">
        <label for="password"><i class="fas fa-lock"></i> Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-green" style="width:100%;padding:13px;font-size:.95rem;justify-content:center;margin-top:8px;">
        <i class="fas fa-sign-in-alt"></i> Sign In
      </button>
    </form>
    <p style="text-align:center;margin-top:20px;font-size:.78rem;color:var(--text-light);">
      <a href="{{ url_for('index') }}" style="color:var(--green-mid);">← Back to website</a>
    </p>
    <div style="margin-top:20px;padding:12px;background:var(--green-tint);border-radius:8px;font-size:.78rem;color:var(--text-light);text-align:center;">
      Default: <code>admin</code> / <code>muddo@admin2024</code>
    </div>
  </div>
</div>
</body>
</html>
