<!DOCTYPE html><html><head><meta charset="UTF-8"></head>
<body style="font-family:'Segoe UI',sans-serif;background:#f0f0f0;padding:32px 0;">
<div style="max-width:560px;margin:0 auto;background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.1);">
  <div style="background:#b71c1c;padding:20px 28px;display:flex;align-items:center;gap:12px;">
    <span style="font-size:1.4rem;">📩</span>
    <div><div style="color:#fff;font-weight:800;font-size:1rem;">New Enquiry Received</div><div style="color:rgba(255,255,255,.7);font-size:.8rem;">Ref: {{ ref }}</div></div>
  </div>
  <div style="padding:28px;">
    <table style="width:100%;border-collapse:collapse;">
      {% for label, value in [('Name', name),('Email', email),('Phone', phone or '—'),('Subject', subject)] %}
      <tr style="border-bottom:1px solid #f0f0f0;"><td style="padding:10px 8px;font-size:.8rem;font-weight:700;color:#565656;width:100px;">{{ label }}</td><td style="padding:10px 8px;font-size:.92rem;color:#111;">{{ value }}</td></tr>
      {% endfor %}
      <tr><td style="padding:10px 8px;font-size:.8rem;font-weight:700;color:#565656;vertical-align:top;">Message</td><td style="padding:10px 8px;font-size:.92rem;color:#111;line-height:1.6;">{{ message }}</td></tr>
    </table>
    <div style="margin-top:20px;text-align:center;">
      <a href="{{ url_for('admin_requests', _external=True) }}" style="background:#0d3d7a;color:#fff;padding:12px 24px;border-radius:8px;text-decoration:none;font-weight:700;font-size:.9rem;display:inline-block;">View in Admin Dashboard →</a>
    </div>
  </div>
</div>
</body></html>
