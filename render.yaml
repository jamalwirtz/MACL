# render.yaml — Render.com deployment configuration
# Commit this to your GitHub repo and connect to Render

services:
  - type: web
    name: muddo-agro
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn --config gunicorn.conf.py app:app"
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true          # Render auto-generates a secure key
      - key: MAIL_PASSWORD
        sync: false                  # Set manually in Render dashboard
      - key: GA_MEASUREMENT_ID
        sync: false
      - key: GOOGLE_MAPS_KEY
        sync: false                  # Get from console.cloud.google.com (enable Maps JS API + Places API)                  # Set manually in Render dashboard
      - key: PYTHON_VERSION
        value: 3.12.0
    plan: free
